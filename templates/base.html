{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Training Attendance{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'img/favicon.ico' %}">
</head>

<body>

<nav class="navbar company-navbar shadow">

    <div class="container justify-content-center">

        <div class="text-center">

            <img src="{% static 'img/vqc_logo.png' %}"
                 alt="VQC Logo"
                 class="company-logo">

            <h2 class="company-name mt-3">
                VONMUE QUALISAFE CONSULTING LIMITED
            </h2>

            <p class="company-tagline">
                Training Attendance Registration System
            </p>

        </div>

    </div>

</nav>

<div class="container py-5">

    {% block content %}
    {% endblock %}

</div>

<!-- <footer class="bg-dark text-white text-center py-3">

    © 2026 VONMUE QUALISAFE CONSULTING LIMITED

</footer> !-->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/script.js' %}"></script>

<footer class="text-center mt-5 py-4 border-top">

    <small class="text-muted">

        © {% now "Y" %} VONMUE QUALISAFE CONSULTING LIMITED

        <br>

        Training Attendance Management System

    </small>

</footer>

</body>
</html>
